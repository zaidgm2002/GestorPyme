services:
  - type: web
    name: gestorpyme-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: gestorpyme-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: PUBLIC_API_URL
        sync: false
      - key: API_URL
        sync: false
      - key: PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
